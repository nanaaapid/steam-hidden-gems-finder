<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Hidden Gems Finder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <section class="hero">

            <h1>Steam Hidden Gems Finder</h1>

            <p>
                Discover underrated games hidden inside Steam's massive library.
            </p>

            <div class="search-box">

                <input
                    type="text"
                    id="gameInput"
                    placeholder="Search a game..."
                >

                <button onclick="searchGame()">
                    Search
                </button>

            </div>

        </section>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
